name: Vercel Deploy

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=preview --git-branch="${{ github.head_ref }}" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build project artifacts
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy preview to Vercel
        id: preview-deploy
        run: |
          url=$(vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}")
          echo "deployment_url=$url" >> "$GITHUB_OUTPUT"

      - name: Add deployment summary
        run: |
          echo "### Preview Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.preview-deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build project artifacts
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production to Vercel
        id: production-deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "deployment_url=$url" >> "$GITHUB_OUTPUT"

      - name: Add deployment summary
        run: |
          echo "### Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.production-deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"
